# DocGuardian AI — local Postgres + pgvector for development.
# Start with:  docker compose up -d
#
# On a fresh machine the DB is pre-seeded automatically:
#   docker/init/01-seed.sql is mounted into /docker-entrypoint-initdb.d/
#   Postgres runs it ONLY when the pgdata volume is empty (first start).
#   Existing machines keep their own data unchanged.
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: docguardian-db
    environment:
      POSTGRES_USER: docguardian
      POSTGRES_PASSWORD: docguardian
      POSTGRES_DB: docguardian
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docguardian"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
